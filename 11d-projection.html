<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Babel Forge: Dynamic 11D Neural Physics</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #030008; font-family: 'Courier New', Courier, monospace; color: #00ffcc; }
        canvas { display: block; }
        
        #banner { 
            position: absolute; 
            top: 0; 
            left: 0; 
            right: 0; 
            background: rgba(10, 5, 20, 0.9); 
            padding: 15px 25px; 
            border-bottom: 2px solid #8b5cf6; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .header-left { display: flex; flex-direction: column; }
        .header-right { display: flex; align-items: center; gap: 20px; }

        h1 { margin: 0; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 2px; color: #fff; }
        p { margin: 2px 0; font-size: 0.8rem; color: #a78bfa; }
        
        .highlight { color: #ff0055; font-weight: bold; }
        
        .button-container { display: flex; gap: 10px; }
        
        button { 
            background: rgba(139, 92, 246, 0.1); 
            color: #c4b5fd; 
            border: 1px solid #8b5cf6; 
            padding: 8px 16px; 
            cursor: pointer; 
            text-transform: uppercase; 
            font-weight: bold; 
            font-size: 0.75rem;
            transition: all 0.3s; 
        }
        button:hover { background: #8b5cf6; color: #fff; box-shadow: 0 0 15px rgba(139, 92, 246, 0.5); }
        button.active { background: #8b5cf6; color: #fff; }
        
        .btn-flash { border-color: #ff0055; color: #ff0055; }
        .btn-flash:hover, .btn-flash.active { background: #ff0055; color: #fff; box-shadow: 0 0 15px rgba(255, 0, 85, 0.5); }
        
        .btn-stim { border-color: #00ffcc; color: #00ffcc; }
        .btn-stim:hover, .btn-stim.active { background: #00ffcc; color: #000; box-shadow: 0 0 15px rgba(0, 255, 204, 0.5); }
        
        .btn-pharma { border-color: #fcd34d; color: #fcd34d; }
        .btn-pharma:hover, .btn-pharma.active { background: #fcd34d; color: #000; box-shadow: 0 0 15px rgba(252, 211, 77, 0.5); }

        .btn-back { border-color: #aaa; color: #aaa; }
        .btn-back:hover { background: #aaa; color: #000; }

        #inspector {
            position: absolute;
            top: 100px;
            right: 20px;
            width: 250px;
            background: rgba(10, 5, 20, 0.9);
            border: 1px solid #8b5cf6;
            padding: 20px;
            color: #c4b5fd;
            font-size: 0.8rem;
            z-index: 50;
            display: none;
            border-radius: 8px;
        }

        #inspector h2 { font-size: 0.9rem; margin-top: 0; border-bottom: 1px solid #8b5cf6; padding-bottom: 5px; color: #fff; }
        .stat-row { margin: 10px 0; display: flex; justify-content: space-between; }
        .stat-label { color: #8a82a8; }

        #stats-overlay {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(10, 5, 20, 0.7);
            padding: 15px;
            border-left: 4px solid #8b5cf6;
            font-size: 0.8rem;
            pointer-events: none;
            border-radius: 0 8px 8px 0;
        }

        .node-label {
            position: absolute;
            background: rgba(0, 0, 0, 0.9);
            color: #c4b5fd;
            padding: 4px 8px;
            font-size: 11px;
            border: 1px solid #8b5cf6;
            pointer-events: none;
            display: none;
            z-index: 200;
            border-radius: 4px;
        }

        #flash-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.1s;
        }

        .glitch { animation: glitch 1s linear infinite; }
        @keyframes glitch { 2%, 64% { transform: translate(2px,0) skew(0deg); } 4%, 60% { transform: translate(-2px,0) skew(0deg); } 62% { transform: translate(0,0) skew(5deg); } }
    </style>
</head>
<body>

    <div id="flash-overlay"></div>

    <div id="banner">
        <div class="header-left">
            <h1 class="glitch">DYNAMIC_NEURAL_PHYSICS</h1>
            <p>Topology: <span id="top-desc" class="highlight">Schaefer 200-ROI / 11D Cliques</span></p>
        </div>
        
        <div class="header-right">
            <div class="button-container">
                <button id="btn-responsive" onclick="resetToHealthy()">Healthy Brain</button>
                <button class="btn-flash" id="btn-resistant" onclick="triggerPTSDFlash()">Trigger PTSD Flash</button>
                <button class="btn-stim" id="btn-stim" onclick="toggleStimulus()">Neural Stimulus</button>
                <button class="btn-pharma" id="btn-pharma" onclick="togglePharma()">ZenBud Agonist</button>
            </div>
            <button class="btn-back" onclick="window.location.href='index.html'">Back</button>
        </div>
    </div>

    <div id="inspector">
        <h2 id="ins-name">LOBE_INSPECTOR</h2>
        <div class="stat-row"><span class="stat-label">Region:</span> <span id="ins-region">-</span></div>
        <div class="stat-row"><span class="stat-label">Activity:</span> <span id="ins-act">-</span></div>
        <div class="stat-row"><span class="stat-label">Connections:</span> <span id="ins-conn">-</span></div>
        <div class="stat-row"><span class="stat-label">Topological D:</span> <span id="ins-dim">-</span></div>
        <p style="font-size: 0.7rem; color: #8a82a8; margin-top: 15px;">Dynamic scaling reflects regional BOLD power & synchronization.</p>
    </div>

    <div id="stats-overlay">
        <p>State: <span id="state-val">AWAITING SIGNAL</span></p>
        <p>Topology Integrity: <span id="integrity-val">100%</span></p>
        <p>Active Cliques: <span id="clique-val">0</span></p>
        <p id="mod-val" style="color: #fcd34d; margin-top: 5px; font-weight: bold;"></p>
    </div>

    <div id="floating-label" class="node-label"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        let scene, camera, renderer, controls, raycaster, mouse;
        let lobeGroup, edgeGroup, cliqueGroup, brainShell;
        let topologyData = null;
        
        let currentStatus = 'RESPONSIVE';
        let isStimulating = false;
        let isPharmaActive = false;
        let stimTime = 0;
        let selectedNode = null;
        let hoveredNode = null;

        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x030008, 0.0015);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
            camera.position.set(0, 100, 300);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 0.3;

            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();

            lobeGroup = new THREE.Group();
            edgeGroup = new THREE.Group();
            cliqueGroup = new THREE.Group();
            scene.add(lobeGroup);
            scene.add(edgeGroup);
            scene.add(cliqueGroup);

            // Subtle brain shell
            const shellGeo = new THREE.SphereGeometry(120, 32, 32);
            const shellMat = new THREE.MeshBasicMaterial({ color: 0x8b5cf6, wireframe: true, transparent: true, opacity: 0.03 });
            brainShell = new THREE.Mesh(shellGeo, shellMat);
            scene.add(brainShell);

            const ambientLight = new THREE.AmbientLight(0x201040);
            scene.add(ambientLight);
            const pointLight = new THREE.PointLight(0x8b5cf6, 2, 500);
            pointLight.position.set(0, 50, 100);
            scene.add(pointLight);

            window.addEventListener('resize', onWindowResize, false);
            window.addEventListener('mousemove', onMouseMove, false);
            window.addEventListener('click', onClick, false);
            
            fetch('data/topology_projection.json')
                .then(response => response.json())
                .then(data => {
                    topologyData = data;
                    loadTopology('RESPONSIVE');
                });

            animate();
        }

        function triggerPTSDFlash() {
            const overlay = document.getElementById('flash-overlay');
            overlay.style.opacity = '1';
            setTimeout(() => {
                overlay.style.opacity = '0';
                loadTopology('RESISTANT');
            }, 100);
            
            // Dramatic camera shake
            const startPos = camera.position.clone();
            let shake = 0;
            const shakeInterval = setInterval(() => {
                camera.position.x += (Math.random() - 0.5) * 50;
                camera.position.y += (Math.random() - 0.5) * 50;
                shake++;
                if(shake > 10) {
                    clearInterval(shakeInterval);
                    camera.position.copy(startPos);
                }
            }, 30);
        }

        function resetToHealthy() {
            loadTopology('RESPONSIVE');
            isPharmaActive = false;
            isStimulating = false;
            document.getElementById('btn-pharma').classList.remove('active');
            document.getElementById('btn-stim').classList.remove('active');
            updateModText();
        }

        function toggleStimulus() {
            isStimulating = !isStimulating;
            document.getElementById('btn-stim').classList.toggle('active', isStimulating);
            updateModText();
        }

        function togglePharma() {
            isPharmaActive = !isPharmaActive;
            document.getElementById('btn-pharma').classList.toggle('active', isPharmaActive);
            updateModText();
            if (isPharmaActive && currentStatus === 'RESISTANT' && isStimulating) {
                // Restoration effect
                setTimeout(() => loadTopology('RESPONSIVE'), 800);
            }
        }

        function updateModText() {
            let text = "";
            if (isStimulating) text += "⚡ STIMULUS: ACTIVE ";
            if (isPharmaActive) text += "💊 ZENBUD: STABILIZING";
            document.getElementById('mod-val').innerText = text;
        }

        function loadTopology(status) {
            if (!topologyData) return;
            currentStatus = status;
            
            while(lobeGroup.children.length > 0) lobeGroup.remove(lobeGroup.children[0]);
            while(edgeGroup.children.length > 0) edgeGroup.remove(edgeGroup.children[0]);
            while(cliqueGroup.children.length > 0) cliqueGroup.remove(cliqueGroup.children[0]);

            const data = topologyData[status];
            const isResistant = status === 'RESISTANT';
            
            document.getElementById('state-val').innerText = isResistant ? "PTSD_FLASH_DYSFUNCTION" : "HEALTHY_COGNITION";
            document.getElementById('state-val').style.color = isResistant ? "#ff0055" : "#00ffcc";
            document.getElementById('integrity-val').innerText = isResistant ? "24%" : "100%";
            document.getElementById('integrity-val').style.color = isResistant ? "#ff0055" : "#00ffcc";
            document.getElementById('clique-val').innerText = data.stats.total_cliques_2D_plus;

            // Render Lobes (Dynamic Spheres)
            const lobeGeo = new THREE.SphereGeometry(4, 16, 16);
            data.nodes.forEach((n) => {
                const color = isResistant ? 0xaa0033 : 0x8b5cf6;
                const lobeMat = new THREE.MeshPhongMaterial({ 
                    color: color, 
                    emissive: color,
                    emissiveIntensity: 0.2,
                    transparent: true,
                    opacity: 0.8
                });
                const mesh = new THREE.Mesh(lobeGeo, lobeMat);
                mesh.position.set(n.x, n.y, n.z);
                mesh.userData = n;
                mesh.userData.origin = new THREE.Vector3(n.x, n.y, n.z);
                lobeGroup.add(mesh);
            });

            // Edges
            const edgeMat = new THREE.LineBasicMaterial({ color: isResistant ? 0x660022 : 0x4c1d95, transparent: true, opacity: 0.1 });
            data.edges.forEach(e => {
                const s = data.nodes[e.source], t = data.nodes[e.target];
                const points = [new THREE.Vector3(s.x, s.y, s.z), new THREE.Vector3(t.x, t.y, t.z)];
                const geo = new THREE.BufferGeometry().setFromPoints(points);
                edgeGroup.add(new THREE.Line(geo, edgeMat));
            });

            // Cliques
            data.cliques.forEach(c => {
                if (c.nodes.length >= 3) {
                    const positions = [];
                    for (let i = 1; i < c.nodes.length - 1; i++) {
                        const n0 = data.nodes[c.nodes[0]], ni = data.nodes[c.nodes[i]], ni1 = data.nodes[c.nodes[i+1]];
                        positions.push(n0.x, n0.y, n0.z, ni.x, ni.y, ni.z, ni1.x, ni1.y, ni1.z);
                    }
                    const geo = new THREE.BufferGeometry();
                    geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
                    geo.computeVertexNormals();
                    const mat = new THREE.MeshPhongMaterial({ 
                        color: isResistant ? 0xff0055 : 0x00ffcc, 
                        transparent: true, 
                        opacity: 0.15, 
                        side: THREE.DoubleSide 
                    });
                    cliqueGroup.add(new THREE.Mesh(geo, mat));
                }
            });
        }

        function onMouseMove(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            const label = document.getElementById('floating-label');
            label.style.left = (event.clientX + 15) + 'px';
            label.style.top = (event.clientY - 10) + 'px';
        }

        function onClick() {
            if (hoveredNode) {
                selectedNode = hoveredNode;
                updateInspector(selectedNode);
                document.getElementById('inspector').style.display = 'block';
            }
        }

        function updateInspector(node) {
            const d = node.userData;
            document.getElementById('ins-name').innerText = d.name;
            document.getElementById('ins-region').innerText = d.region;
            document.getElementById('ins-act').innerText = (node.scale.x * 100).toFixed(0) + "% POWER";
            const conns = topologyData[currentStatus].edges.filter(e => e.source === d.id || e.target === d.id).length;
            document.getElementById('ins-conn').innerText = conns;
            const nodeCliques = topologyData[currentStatus].cliques.filter(c => c.nodes.includes(d.id));
            const maxDim = nodeCliques.length > 0 ? Math.max(...nodeCliques.map(c => c.dimension)) : 0;
            document.getElementById('ins-dim').innerText = maxDim + "D";
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            const time = Date.now() * 0.001;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(lobeGroup.children);
            const label = document.getElementById('floating-label');
            
            if (intersects.length > 0) {
                hoveredNode = intersects[0].object;
                label.innerText = hoveredNode.userData.name;
                label.style.display = 'block';
                document.body.style.cursor = 'pointer';
            } else {
                hoveredNode = null;
                label.style.display = 'none';
                document.body.style.cursor = 'default';
            }

            // Dynamic Scaling & Movement Logic
            lobeGroup.children.forEach(node => {
                const dist = node.userData.origin.length();
                const wave = Math.sin(dist * 0.05 - time * 4);
                
                if (isStimulating) {
                    if (currentStatus === 'RESISTANT' && !isPharmaActive) {
                        // PTSD Response: Chaotic Scaling & Fragmentation
                        const chaoticScale = 1.0 + wave * 2.0 + (Math.random() - 0.5) * 1.5;
                        node.scale.setScalar(Math.max(0.1, chaoticScale));
                        node.position.x = node.userData.origin.x + (Math.random() - 0.5) * 40;
                        node.position.y = node.userData.origin.y + (Math.random() - 0.5) * 40;
                        node.material.emissiveIntensity = 2.0;
                        node.material.color.setHex(0xff0055);
                    } else if (isPharmaActive) {
                        // Pharma Stabilized Response: Rhythmic Scaling
                        const pharmaScale = 1.2 + wave * 0.4;
                        node.scale.setScalar(pharmaScale);
                        node.position.lerp(node.userData.origin, 0.1);
                        node.material.emissiveIntensity = 0.5;
                        node.material.color.setHex(0xfcd34d);
                    } else {
                        // Healthy Response: Synchronized Largening/Minimizing
                        const healthyScale = 1.0 + wave * 0.8;
                        node.scale.setScalar(healthyScale);
                        node.position.y = node.userData.origin.y + wave * 10;
                        node.material.color.setHex(0x00ffcc);
                    }
                } else {
                    // Resting State
                    const baseScale = currentStatus === 'RESISTANT' ? 0.4 : 1.0;
                    node.scale.lerp(new THREE.Vector3(baseScale, baseScale, baseScale), 0.1);
                    node.position.lerp(node.userData.origin, 0.1);
                    node.material.color.lerp(new THREE.Color(currentStatus === 'RESISTANT' ? 0xaa0033 : 0x8b5cf6), 0.1);
                    node.material.emissiveIntensity = 0.2;
                }
                
                if (node === selectedNode) {
                    node.material.emissive.setHex(0xffffff);
                    node.material.emissiveIntensity = 1.0;
                    updateInspector(node);
                }
            });

            cliqueGroup.children.forEach((c, i) => {
                c.material.opacity = (Math.sin(time * 2 + i) * 0.1) + 0.2;
                if (isStimulating && currentStatus === 'RESISTANT' && !isPharmaActive) {
                    c.visible = Math.random() > 0.5; // Flicker
                } else {
                    c.visible = true;
                }
            });

            renderer.render(scene, camera);
        }
        init();
    </script>
</body>
</html>
