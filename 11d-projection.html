<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Babel Forge: 11D Topological Projection</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050505; font-family: 'Courier New', Courier, monospace; color: #00ffcc; }
        canvas { display: block; }
        
        #banner { 
            position: absolute; 
            top: 0; 
            left: 0; 
            right: 0; 
            background: rgba(5, 5, 5, 0.85); 
            padding: 15px 25px; 
            border-bottom: 1px solid #00ffcc; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            z-index: 100;
            backdrop-filter: blur(5px);
        }

        .header-left { display: flex; flex-direction: column; }
        .header-right { display: flex; align-items: center; gap: 20px; }

        h1 { margin: 0; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 2px; }
        p { margin: 2px 0; font-size: 0.8rem; }
        
        .highlight { color: #ff0055; font-weight: bold; }
        
        .button-container { display: flex; gap: 10px; }
        
        button { 
            background: transparent; 
            color: #00ffcc; 
            border: 1px solid #00ffcc; 
            padding: 8px 16px; 
            cursor: pointer; 
            text-transform: uppercase; 
            font-weight: bold; 
            font-size: 0.75rem;
            transition: all 0.3s; 
        }
        button:hover { background: #00ffcc; color: #000; box-shadow: 0 0 10px #00ffcc; }
        button.active { background: #00ffcc; color: #000; }
        
        .btn-stim { border-color: #a78bfa; color: #a78bfa; }
        .btn-stim:hover, .btn-stim.active { background: #a78bfa; color: #000; box-shadow: 0 0 10px #a78bfa; }
        
        .btn-pharma { border-color: #fcd34d; color: #fcd34d; }
        .btn-pharma:hover, .btn-pharma.active { background: #fcd34d; color: #000; box-shadow: 0 0 10px #fcd34d; }

        .btn-back { border-color: #aaa; color: #aaa; }
        .btn-back:hover { background: #aaa; color: #000; box-shadow: 0 0 10px #aaa; }

        #inspector {
            position: absolute;
            top: 100px;
            right: 20px;
            width: 250px;
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid #00ffcc;
            padding: 20px;
            color: #00ffcc;
            font-size: 0.8rem;
            z-index: 50;
            display: none;
        }

        #inspector h2 { font-size: 0.9rem; margin-top: 0; border-bottom: 1px solid #00ffcc; padding-bottom: 5px; color: #fff; }
        .stat-row { margin: 10px 0; display: flex; justify-content: space-between; }
        .stat-label { color: #aaa; }

        #stats-overlay {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px;
            border-left: 3px solid #00ffcc;
            font-size: 0.8rem;
            pointer-events: none;
        }

        .node-label {
            position: absolute;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 2px 5px;
            font-size: 10px;
            border: 1px solid #00ffcc;
            pointer-events: none;
            display: none;
            z-index: 200;
        }

        .glitch { animation: glitch 1s linear infinite; }
        @keyframes glitch { 2%, 64% { transform: translate(2px,0) skew(0deg); } 4%, 60% { transform: translate(-2px,0) skew(0deg); } 62% { transform: translate(0,0) skew(5deg); } }
    </style>
</head>
<body>

    <div id="banner">
        <div class="header-left">
            <h1 class="glitch">11D_CLIQUE_DETECTION</h1>
            <p>Target: <span class="highlight">ds004393 (Dorsal Attention Network)</span> @ <span class="highlight">0.030 - 0.039 Hz</span></p>
        </div>
        
        <div class="header-right">
            <div class="button-container">
                <button id="btn-responsive" onclick="loadTopology('RESPONSIVE')">Simulate Healthy</button>
                <button id="btn-resistant" style="border-color: #ff0055; color: #ff0055;" onclick="loadTopology('RESISTANT')">Trigger Dysfunction</button>
                <button class="btn-stim" id="btn-stim" onclick="toggleStimulus()">Neural Stimulus</button>
                <button class="btn-pharma" id="btn-pharma" onclick="togglePharma()">ZenBud Agonist</button>
            </div>
            <button class="btn-back" onclick="window.location.href='index.html'">Back</button>
        </div>
    </div>

    <div id="inspector">
        <h2 id="ins-name">NODE_INSPECTOR</h2>
        <div class="stat-row"><span class="stat-label">Brain Region:</span> <span id="ins-region">-</span></div>
        <div class="stat-row"><span class="stat-label">Schaefer ROI:</span> <span id="ins-roi">-</span></div>
        <div class="stat-row"><span class="stat-label">Connections:</span> <span id="ins-conn">-</span></div>
        <div class="stat-row"><span class="stat-label">Max Clique D:</span> <span id="ins-dim">-</span></div>
        <p style="font-size: 0.7rem; color: #8a82a8; margin-top: 15px;">Click a node to pin inspector. Double-click to clear.</p>
    </div>

    <div id="stats-overlay">
        <p>State: <span id="state-val">AWAITING SIGNAL</span></p>
        <p>Max Dimensions: <span id="dim-val">0D</span></p>
        <p>Active Cliques: <span id="clique-val">0</span></p>
        <p id="mod-val" style="color: #fcd34d; margin-top: 5px;"></p>
    </div>

    <div id="floating-label" class="node-label"></div>

    <!-- Load Three.js from CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        let scene, camera, renderer, controls, raycaster, mouse;
        let nodeGroup, edgeGroup, cliqueGroup;
        let topologyData = null;
        
        let currentStatus = 'RESPONSIVE';
        let isStimulating = false;
        let isPharmaActive = false;
        let stimTime = 0;
        let selectedNode = null;
        let hoveredNode = null;

        // Initialize Three.js
        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x050505, 0.002);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 150;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 0.5;

            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();

            // Groups for organization
            nodeGroup = new THREE.Group();
            edgeGroup = new THREE.Group();
            cliqueGroup = new THREE.Group();
            scene.add(nodeGroup);
            scene.add(edgeGroup);
            scene.add(cliqueGroup);

            // Lighting
            const ambientLight = new THREE.AmbientLight(0x404040);
            scene.add(ambientLight);
            const pointLight = new THREE.PointLight(0x00ffcc, 1, 300);
            pointLight.position.set(0, 0, 0);
            scene.add(pointLight);

            window.addEventListener('resize', onWindowResize, false);
            window.addEventListener('mousemove', onMouseMove, false);
            window.addEventListener('click', onClick, false);
            window.addEventListener('dblclick', () => { selectedNode = null; document.getElementById('inspector').style.display = 'none'; });
            
            // Fetch the forged data
            fetch('data/topology_projection.json')
                .then(response => response.json())
                .then(data => {
                    topologyData = data;
                    loadTopology('RESPONSIVE'); // Default state
                })
                .catch(err => {
                    console.error("Failed to load topology payload:", err);
                    document.getElementById('state-val').innerText = "ERROR: Payload missing. Run Python forge.";
                });

            animate();
        }

        function onMouseMove(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            
            const label = document.getElementById('floating-label');
            label.style.left = (event.clientX + 15) + 'px';
            label.style.top = (event.clientY - 10) + 'px';
        }

        function onClick() {
            if (hoveredNode) {
                selectedNode = hoveredNode;
                updateInspector(selectedNode);
                document.getElementById('inspector').style.display = 'block';
            }
        }

        function updateInspector(node) {
            const data = node.userData;
            document.getElementById('ins-name').innerText = data.name;
            document.getElementById('ins-region').innerText = data.region;
            document.getElementById('ins-roi').innerText = "ROI_" + data.id;
            
            // Calculate connections
            const connections = topologyData[currentStatus].edges.filter(e => e.source === data.id || e.target === data.id).length;
            document.getElementById('ins-conn').innerText = connections;
            
            // Calculate max dimension clique this node belongs to
            const nodeCliques = topologyData[currentStatus].cliques.filter(c => c.nodes.includes(data.id));
            const maxDim = nodeCliques.length > 0 ? Math.max(...nodeCliques.map(c => c.dimension)) : 0;
            document.getElementById('ins-dim').innerText = maxDim + "D";
        }

        function toggleStimulus() {
            isStimulating = !isStimulating;
            document.getElementById('btn-stim').classList.toggle('active', isStimulating);
            if (isStimulating) stimTime = 0;
            updateModText();
        }

        function togglePharma() {
            isPharmaActive = !isPharmaActive;
            document.getElementById('btn-pharma').classList.toggle('active', isPharmaActive);
            updateModText();
            if (isPharmaActive && currentStatus === 'RESISTANT' && isStimulating) {
                setTimeout(() => loadTopology('RESPONSIVE'), 500);
            }
        }

        function updateModText() {
            let text = "";
            if (isStimulating) text += "⚡ NEURAL STIMULATION ACTIVE ";
            if (isPharmaActive) text += "💊 PHARMA MODULATION LOADED";
            document.getElementById('mod-val').innerText = text;
        }

        function clearTopology() {
            while(nodeGroup.children.length > 0){ nodeGroup.remove(nodeGroup.children[0]); }
            while(edgeGroup.children.length > 0){ edgeGroup.remove(edgeGroup.children[0]); }
            while(cliqueGroup.children.length > 0){ cliqueGroup.remove(cliqueGroup.children[0]); }
        }

        function loadTopology(status) {
            if (!topologyData) return;
            currentStatus = status;
            clearTopology();
            
            document.getElementById('btn-responsive').classList.toggle('active', status === 'RESPONSIVE');
            document.getElementById('btn-resistant').classList.toggle('active', status === 'RESISTANT');

            const data = topologyData[status];
            const isResistant = status === 'RESISTANT';
            const colorCore = isResistant ? 0xff0055 : 0x00ffcc;
            const colorEdge = isResistant ? 0xaa0033 : 0x0088aa;

            document.getElementById('state-val').innerText = isResistant ? "FRAGMENTED (0.030Hz FAILURE)" : "ASSEMBLED (HEALTHY)";
            document.getElementById('state-val').style.color = isResistant ? "#ff0055" : "#00ffcc";
            document.getElementById('dim-val').innerText = data.stats.max_dimension_found + "D";
            document.getElementById('clique-val').innerText = data.stats.total_cliques_2D_plus;

            const nodeGeometry = new THREE.SphereGeometry(1.2, 8, 8);
            data.nodes.forEach((n, i) => {
                const nodeMaterial = new THREE.MeshPhongMaterial({ color: 0xffffff, emissive: 0x333333 });
                const sphere = new THREE.Mesh(nodeGeometry, nodeMaterial);
                sphere.position.set(n.x, n.y, n.z);
                sphere.userData = n; 
                sphere.userData.origin = new THREE.Vector3(n.x, n.y, n.z);
                nodeGroup.add(sphere);
            });

            const edgeMaterial = new THREE.LineBasicMaterial({ color: colorEdge, transparent: true, opacity: 0.2 });
            data.edges.forEach(e => {
                const source = data.nodes[e.source];
                const target = data.nodes[e.target];
                if (!source || !target) return;
                const points = [new THREE.Vector3(source.x, source.y, source.z), new THREE.Vector3(target.x, target.y, target.z)];
                const geometry = new THREE.BufferGeometry().setFromPoints(points);
                const line = new THREE.Line(geometry, edgeMaterial);
                edgeGroup.add(line);
            });

            data.cliques.forEach(c => {
                if (c.nodes.length >= 3) {
                    const geometry = new THREE.BufferGeometry();
                    const positions = [];
                    for (let i = 1; i < c.nodes.length - 1; i++) {
                        const n0 = data.nodes[c.nodes[0]], ni = data.nodes[c.nodes[i]], ni1 = data.nodes[c.nodes[i+1]];
                        positions.push(n0.x, n0.y, n0.z, ni.x, ni.y, ni.z, ni1.x, ni1.y, ni1.z);
                    }
                    geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
                    geometry.computeVertexNormals();
                    const opacity = Math.min(0.7, c.dimension * 0.12);
                    const material = new THREE.MeshPhongMaterial({ color: colorCore, transparent: true, opacity: opacity, side: THREE.DoubleSide });
                    cliqueGroup.add(new THREE.Mesh(geometry, material));
                }
            });
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            const time = Date.now() * 0.001;

            // Raycasting for labels/hover
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(nodeGroup.children);
            const label = document.getElementById('floating-label');
            
            if (intersects.length > 0) {
                hoveredNode = intersects[0].object;
                label.innerText = hoveredNode.userData.name;
                label.style.display = 'block';
                document.body.style.cursor = 'pointer';
            } else {
                hoveredNode = null;
                label.style.display = 'none';
                document.body.style.cursor = 'default';
            }

            if (isStimulating) {
                stimTime += 0.05;
                nodeGroup.children.forEach((node) => {
                    const dist = node.userData.origin.length();
                    const wave = Math.sin(dist * 0.2 - stimTime * 5);
                    if (currentStatus === 'RESISTANT' && !isPharmaActive) {
                        node.position.x = node.userData.origin.x + wave * 15;
                        node.position.y = node.userData.origin.y + wave * 15;
                        node.position.z = node.userData.origin.z + wave * 15;
                        node.material.color.setHex(0xff0055);
                    } else if (isPharmaActive) {
                        node.position.copy(node.userData.origin);
                        node.position.addScaledVector(node.userData.origin.clone().normalize(), wave * 1.5);
                        node.material.color.setHex(0xfcd34d);
                    } else {
                        node.position.copy(node.userData.origin);
                        node.position.y += wave * 4;
                        node.material.color.setHex(0xa78bfa);
                    }
                });
            } else {
                nodeGroup.children.forEach(node => {
                    node.position.lerp(node.userData.origin, 0.1);
                    node.material.color.lerp(new THREE.Color(node === selectedNode ? 0x00ffcc : 0xffffff), 0.1);
                    if (node === selectedNode) node.material.emissive.setHex(0x00ffcc);
                    else node.material.emissive.setHex(0x333333);
                });
            }

            if (cliqueGroup.children.length > 0) {
                cliqueGroup.children.forEach((child, i) => {
                    const pulse = (Math.sin(time * 3 + i) * 0.1) + 0.3;
                    child.material.opacity = isStimulating ? pulse + 0.3 : pulse;
                });
            }

            renderer.render(scene, camera);
        }
        init();
    </script>
</body>
</html>
