<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Babel Forge: 11D Topological Projection</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050505; font-family: 'Courier New', Courier, monospace; color: #00ffcc; }
        canvas { display: block; }
        
        #banner { 
            position: absolute; 
            top: 0; 
            left: 0; 
            right: 0; 
            background: rgba(5, 5, 5, 0.85); 
            padding: 15px 25px; 
            border-bottom: 1px solid #00ffcc; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            z-index: 100;
            backdrop-filter: blur(5px);
        }

        .header-left { display: flex; flex-direction: column; }
        .header-right { display: flex; align-items: center; gap: 20px; }

        h1 { margin: 0; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 2px; }
        p { margin: 2px 0; font-size: 0.8rem; }
        
        .highlight { color: #ff0055; font-weight: bold; }
        
        .button-container { display: flex; gap: 10px; }
        
        button { 
            background: transparent; 
            color: #00ffcc; 
            border: 1px solid #00ffcc; 
            padding: 8px 16px; 
            cursor: pointer; 
            text-transform: uppercase; 
            font-weight: bold; 
            font-size: 0.75rem;
            transition: all 0.3s; 
        }
        button:hover { background: #00ffcc; color: #000; box-shadow: 0 0 10px #00ffcc; }
        
        .btn-back { border-color: #aaa; color: #aaa; }
        .btn-back:hover { background: #aaa; color: #000; box-shadow: 0 0 10px #aaa; }

        #stats-overlay {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px;
            border-left: 3px solid #00ffcc;
            font-size: 0.8rem;
            pointer-events: none;
        }

        .glitch { animation: glitch 1s linear infinite; }
        @keyframes glitch { 2%, 64% { transform: translate(2px,0) skew(0deg); } 4%, 60% { transform: translate(-2px,0) skew(0deg); } 62% { transform: translate(0,0) skew(5deg); } }
    </style>
</head>
<body>

    <div id="banner">
        <div class="header-left">
            <h1 class="glitch">11D_CLIQUE_DETECTION</h1>
            <p>Target: <span class="highlight">ds004393 (Dorsal Attention Network)</span> @ <span class="highlight">0.030 - 0.039 Hz</span></p>
        </div>
        
        <div class="header-right">
            <div class="button-container">
                <button onclick="loadTopology('RESPONSIVE')">Simulate Healthy</button>
                <button style="border-color: #ff0055; color: #ff0055;" onclick="loadTopology('RESISTANT')">Trigger Dysfunction</button>
            </div>
            <button class="btn-back" onclick="window.location.href='index.html'">Back to Dashboard</button>
        </div>
    </div>

    <div id="stats-overlay">
        <p>State: <span id="state-val">AWAITING SIGNAL</span></p>
        <p>Max Dimensions: <span id="dim-val">0D</span></p>
        <p>Active Cliques: <span id="clique-val">0</span></p>
    </div>

    <!-- Load Three.js from CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        let scene, camera, renderer, controls;
        let nodeGroup, edgeGroup, cliqueGroup;
        let topologyData = null;

        // Initialize Three.js
        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x050505, 0.002);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 150;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 1.0;

            // Groups for organization
            nodeGroup = new THREE.Group();
            edgeGroup = new THREE.Group();
            cliqueGroup = new THREE.Group();
            scene.add(nodeGroup);
            scene.add(edgeGroup);
            scene.add(cliqueGroup);

            // Lighting
            const ambientLight = new THREE.AmbientLight(0x404040);
            scene.add(ambientLight);
            const pointLight = new THREE.PointLight(0x00ffcc, 1, 300);
            pointLight.position.set(0, 0, 0);
            scene.add(pointLight);

            window.addEventListener('resize', onWindowResize, false);
            
            // Fetch the forged data
            fetch('data/topology_projection.json')
                .then(response => response.json())
                .then(data => {
                    topologyData = data;
                    loadTopology('RESPONSIVE'); // Default state
                })
                .catch(err => {
                    console.error("Failed to load topology payload:", err);
                    document.getElementById('state-val').innerText = "ERROR: Payload missing. Run Python forge.";
                });

            animate();
        }

        function clearTopology() {
            while(nodeGroup.children.length > 0){ 
                nodeGroup.remove(nodeGroup.children[0]); 
            }
            while(edgeGroup.children.length > 0){ 
                edgeGroup.remove(edgeGroup.children[0]); 
            }
            while(cliqueGroup.children.length > 0){ 
                cliqueGroup.remove(cliqueGroup.children[0]); 
            }
        }

        function loadTopology(status) {
            if (!topologyData) return;
            clearTopology();

            const data = topologyData[status];
            const isResistant = status === 'RESISTANT';
            const colorCore = isResistant ? 0xff0055 : 0x00ffcc;
            const colorEdge = isResistant ? 0xaa0033 : 0x0088aa;

            document.getElementById('state-val').innerText = isResistant ? "FRAGMENTED (0.030Hz FAILURE)" : "ASSEMBLED (HEALTHY)";
            document.getElementById('state-val').style.color = isResistant ? "#ff0055" : "#00ffcc";
            document.getElementById('dim-val').innerText = data.stats.max_dimension_found + "D";
            document.getElementById('clique-val').innerText = data.stats.total_cliques_2D_plus;

            // 1. Render Nodes (Neurons)
            const nodeGeometry = new THREE.SphereGeometry(1, 8, 8);
            const nodeMaterial = new THREE.MeshBasicMaterial({ color: 0xffffff });
            
            data.nodes.forEach(n => {
                const sphere = new THREE.Mesh(nodeGeometry, nodeMaterial);
                sphere.position.set(n.x, n.y, n.z);
                // Jitter resistant nodes slightly to represent dysfunction
                if (isResistant) {
                    sphere.position.x += (Math.random() - 0.5) * 5;
                    sphere.position.y += (Math.random() - 0.5) * 5;
                    sphere.position.z += (Math.random() - 0.5) * 5;
                }
                nodeGroup.add(sphere);
            });

            // 2. Render 1D Edges
            const edgeMaterial = new THREE.LineBasicMaterial({ color: colorEdge, transparent: true, opacity: 0.3 });
            data.edges.forEach(e => {
                const points = [];
                points.push(new THREE.Vector3(data.nodes[e.source].x, data.nodes[e.source].y, data.nodes[e.source].z));
                points.push(new THREE.Vector3(data.nodes[e.target].x, data.nodes[e.target].y, data.nodes[e.target].z));
                const geometry = new THREE.BufferGeometry().setFromPoints(points);
                const line = new THREE.Line(geometry, edgeMaterial);
                edgeGroup.add(line);
            });

            // 3. Render High-D Cliques (Triangles/Tetrahedrons)
            data.cliques.forEach(c => {
                if (c.nodes.length >= 3) {
                    const geometry = new THREE.BufferGeometry();
                    const positions = [];
                    
                    // Render a fan of triangles for the clique
                    for (let i = 1; i < c.nodes.length - 1; i++) {
                        positions.push(data.nodes[c.nodes[0]].x, data.nodes[c.nodes[0]].y, data.nodes[c.nodes[0]].z);
                        positions.push(data.nodes[c.nodes[i]].x, data.nodes[c.nodes[i]].y, data.nodes[c.nodes[i]].z);
                        positions.push(data.nodes[c.nodes[i+1]].x, data.nodes[c.nodes[i+1]].y, data.nodes[c.nodes[i+1]].z);
                    }
                    
                    geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
                    geometry.computeVertexNormals();
                    
                    // Opacity scales with dimension (higher D = more solid)
                    const opacity = Math.min(0.8, c.dimension * 0.15);
                    const material = new THREE.MeshPhongMaterial({ 
                        color: colorCore, 
                        transparent: true, 
                        opacity: opacity, 
                        side: THREE.DoubleSide,
                        shininess: 100
                    });
                    const mesh = new THREE.Mesh(geometry, material);
                    cliqueGroup.add(mesh);
                }
            });
            
            // Dramatic camera zoom effect on change
            camera.position.z = 50;
            const targetZ = isResistant ? 200 : 150;
            const zoomInterval = setInterval(() => {
                camera.position.z += (targetZ - camera.position.z) * 0.1;
                if(Math.abs(camera.position.z - targetZ) < 1) clearInterval(zoomInterval);
            }, 30);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            
            // Pulse effect for healthy high-D cliques
            if (cliqueGroup.children.length > 0) {
                const time = Date.now() * 0.001;
                cliqueGroup.children.forEach((child, i) => {
                    child.material.opacity = (Math.sin(time * 2 + i) * 0.2) + 0.3;
                });
            }

            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
