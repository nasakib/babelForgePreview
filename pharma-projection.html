<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pharmacological Topology Forge - 11D Projection</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050816; color: white; font-family: 'Inter', sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; display: block; }
        #ui-panel { position: absolute; top: 20px; left: 20px; background: rgba(0, 0, 0, 0.8); padding: 20px; border-radius: 8px; border: 1px solid #9333EA; max-width: 350px; }
        h1 { margin-top: 0; font-size: 1.2rem; color: #9b59b6; }
        p { font-size: 0.9rem; color: #ccc; }
        .btn { background: #9333EA; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; transition: background 0.3s; margin-top: 10px; }
        .btn:hover { background: #7e22ce; }
        #status { margin-top: 15px; font-weight: bold; text-align: center; }
        .status-resistant { color: #e74c3c; }
        .status-responsive { color: #2ecc71; }
    </style>
</head>
<body>
    <div id="ui-panel">
        <h1>Babel Forge v39</h1>
        <p><strong>Experiment:</strong> Pharmacological Topology Repair</p>
        <p><strong>Target:</strong> DorsAttn @ 0.030 Hz</p>
        <p><strong>Current State:</strong> Treatment-Resistant (1D Collapse)</p>
        <button id="inject-btn" class="btn">Inject Simulated Agonist</button>
        <div id="status" class="status-resistant">TOPOLOGY COLLAPSED</div>
    </div>
    <div id="canvas-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        let scene, camera, renderer, controls;
        let nodesData = [];
        let preEdges = [], postEdges = [], postCliques = [];
        let currentEdgesGroup = new THREE.Group();
        let currentCliquesGroup = new THREE.Group();
        let nodeObjects = {};
        let isTreated = false;

        init();
        
        function init() {
            const container = document.getElementById('canvas-container');

            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x050816, 0.002);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 2000);
            camera.position.set(0, 0, 400);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            container.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 1.0;

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);
            const pointLight = new THREE.PointLight(0x9333EA, 1);
            pointLight.position.set(200, 200, 200);
            scene.add(pointLight);

            scene.add(currentEdgesGroup);
            scene.add(currentCliquesGroup);

            fetch('data/pharma_projection.json')
                .then(response => response.json())
                .then(data => {
                    nodesData = data.nodes;
                    preEdges = data.states.pre_treatment.edges;
                    postEdges = data.states.post_treatment.edges;
                    postCliques = data.states.post_treatment.cliques;
                    buildNodes();
                    buildEdges(preEdges);
                    animate();
                })
                .catch(err => console.error('Error loading topological data:', err));

            window.addEventListener('resize', onWindowResize);

            document.getElementById('inject-btn').addEventListener('click', toggleTreatment);
        }

        function buildNodes() {
            const geometry = new THREE.SphereGeometry(2, 16, 16);
            nodesData.forEach(node => {
                const material = new THREE.MeshStandardMaterial({ 
                    color: new THREE.Color(node.color),
                    emissive: new THREE.Color(node.color),
                    emissiveIntensity: 0.5,
                    roughness: 0.2
                });
                const sphere = new THREE.Mesh(geometry, material);
                sphere.position.set(node.x, node.y, node.z);
                scene.add(sphere);
                nodeObjects[node.id] = sphere;
            });
        }

        function buildEdges(edgesData) {
            while(currentEdgesGroup.children.length > 0){ 
                currentEdgesGroup.remove(currentEdgesGroup.children[0]); 
            }
            
            const material = new THREE.LineBasicMaterial({ 
                color: 0xffffff, 
                transparent: true, 
                opacity: 0.15 
            });

            const geometry = new THREE.BufferGeometry();
            const positions = [];

            edgesData.forEach(edge => {
                const sourceNode = nodeObjects[edge.source];
                const targetNode = nodeObjects[edge.target];
                if(sourceNode && targetNode) {
                    positions.push(sourceNode.position.x, sourceNode.position.y, sourceNode.position.z);
                    positions.push(targetNode.position.x, targetNode.position.y, targetNode.position.z);
                }
            });

            geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            const lines = new THREE.LineSegments(geometry, material);
            currentEdgesGroup.add(lines);
        }

        function buildCliques(cliquesData) {
            while(currentCliquesGroup.children.length > 0){ 
                currentCliquesGroup.remove(currentCliquesGroup.children[0]); 
            }

            cliquesData.forEach(clique => {
                if (clique.length < 3) return;
                
                const geometry = new THREE.BufferGeometry();
                const positions = [];
                const centerNode = nodeObjects[clique[0]];
                
                for(let i = 1; i < clique.length - 1; i++) {
                    const n1 = nodeObjects[clique[i]];
                    const n2 = nodeObjects[clique[i+1]];
                    positions.push(centerNode.position.x, centerNode.position.y, centerNode.position.z);
                    positions.push(n1.position.x, n1.position.y, n1.position.z);
                    positions.push(n2.position.x, n2.position.y, n2.position.z);
                }
                
                geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
                geometry.computeVertexNormals();
                
                const material = new THREE.MeshBasicMaterial({
                    color: 0x9333EA,
                    transparent: true,
                    opacity: 0.05,
                    side: THREE.DoubleSide,
                    wireframe: false
                });
                
                const mesh = new THREE.Mesh(geometry, material);
                currentCliquesGroup.add(mesh);
            });
        }

        function toggleTreatment() {
            const btn = document.getElementById('inject-btn');
            const status = document.getElementById('status');
            
            isTreated = !isTreated;

            const stateText = document.querySelector('#ui-panel p:nth-child(4)');

            if(isTreated) {
                btn.innerText = "Revert Treatment";
                status.innerText = "11D CLIQUES RESTORED";
                status.className = "status-responsive";
                if (stateText) stateText.innerHTML = "<strong>Current State:</strong> Healthy (11D Topology)";

                buildEdges(postEdges);
                buildCliques(postCliques);

                controls.autoRotateSpeed = 5.0;
                setTimeout(() => { controls.autoRotateSpeed = 1.0; }, 2000);

            } else {
                btn.innerText = "Inject Simulated Agonist";
                status.innerText = "TOPOLOGY COLLAPSED";
                status.className = "status-resistant";
                if (stateText) stateText.innerHTML = "<strong>Current State:</strong> Treatment-Resistant (1D Collapse)";

                buildEdges(preEdges);
                while(currentCliquesGroup.children.length > 0){ 
                    currentCliquesGroup.remove(currentCliquesGroup.children[0]); 
                }
            }        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
